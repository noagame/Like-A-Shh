# ═══════════════════════════════════════════════════════════
#  LIKE A SHH — Docker Compose (3 servicios)
# ═══════════════════════════════════════════════════════════
#  Uso:
#    docker-compose up -d --build    # Construir e iniciar
#    docker-compose logs -f          # Ver logs
#    docker-compose down             # Detener
# ═══════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: likeashh-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - likeashh-net

  # ── Backend (Express API) ──
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: likeashh-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/likeashh
      - JWT_SECRET=${JWT_SECRET:-likeashh_super_secret_key_change_in_production_2024}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    volumes:
      - uploads-data:/app/public/uploads
    networks:
      - likeashh-net

  # ── Frontend (Vite + Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: likeashh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    networks:
      - likeashh-net

volumes:
  mongo-data:
  uploads-data:

networks:
  likeashh-net:
    driver: bridge
